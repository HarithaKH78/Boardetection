<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Settings | Boar Detection</title>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body class="bg-gray-100 font-sans min-vh-100 flex">

<!-- Sidebar -->
<aside class="w-64 glass-sidebar shrink-0 p-6 flex flex-col justify-between hidden md:flex">
    <div>
        <h1 class="text-2xl font-black text-gray-800 mb-10 flex items-center gap-2">🐗 Boar Admin</h1>
        <nav class="space-y-2">
            <a href="/admin/dashboard" class="nav-link">📊 Dashboard</a>
            <a href="/camera" target="_blank" class="nav-link">🎥 Live Camera</a>
            <a href="/admin/settings" class="nav-link active">⚙️ Settings</a>
        </nav>
    </div>
    
    <div class="space-y-4">
        <button id="themeToggle" class="theme-btn w-full justify-center">🌙 Dark Mode</button>
        <button id="logoutBtn" class="text-red-500 font-semibold py-2 px-4 w-full text-center hover:bg-white rounded transition">Logout</button>
    </div>
</aside>

<!-- Main content -->
<main class="flex-1 p-8 overflow-y-auto w-full max-w-3xl">
    <header class="mb-8">
        <h2 class="text-3xl font-bold text-gray-800">System Configuration</h2>
        <p class="text-gray-600 mt-2">Manage API keys, phone numbers, and alert templates.</p>
    </header>

    <div class="glass-card p-8 rounded-xl shadow-sm mb-8">
        <form id="settingsForm">
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Roboflow Model Endpoint/Key</label>
                <input type="text" id="ROBOFLOW_API_KEY" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. Vy01Rbb...">
                <p class="text-xs text-gray-500 mt-1">Leave unchanged to keep current key.</p>
            </div>
            
            <hr class="my-6 border-gray-200">
            
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Registered Phone Numbers</label>
                <input type="text" id="REGISTERED_NUMBERS" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="+1234567890,+0987654321">
                <p class="text-xs text-gray-500 mt-1">Comma-separated list of numbers (with country code).</p>
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">SMS Alert Message</label>
                <input type="text" id="ALERT_MESSAGE" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="🚨 ALERT: Wild Boar detected!">
            </div>

            <div class="flex items-center justify-between mt-8">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition">Save Changes</button>
                <span id="saveStatus" class="font-medium text-sm hidden"></span>
            </div>
        </form>
    </div>
</main>

<script src="/static/js/admin.js"></script>
</body>
</html>
