<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Boar Detection</title>
    <link rel="stylesheet" href="/static/css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans min-vh-100 flex">

<!-- Sidebar -->
<aside class="w-64 glass-sidebar shrink-0 p-6 flex flex-col justify-between hidden md:flex">
    <div>
        <h1 class="text-2xl font-black text-gray-800 mb-10 flex items-center gap-2">🐗 Boar Admin</h1>
        <nav class="space-y-2">
            <a href="/admin/dashboard" class="nav-link active">📊 Dashboard</a>
            <a href="/camera" target="_blank" class="nav-link">🎥 Live Camera</a>
            <a href="/admin/settings" class="nav-link">⚙️ Settings</a>
        </nav>
    </div>
    
    <div class="space-y-4">
        <button id="themeToggle" class="theme-btn w-full justify-center">🌙 Dark Mode</button>
        <button id="logoutBtn" class="text-red-500 font-semibold py-2 px-4 w-full text-center hover:bg-white rounded transition">Logout</button>
    </div>
</aside>

<!-- Main content -->
<main class="flex-1 p-8 overflow-y-auto overflow-x-hidden">
    <header class="mb-8">
        <h2 class="text-3xl font-bold text-gray-800">Forecast Summary</h2>
        <p class="text-gray-600 mt-2">Predicted risk and historical detection data over time.</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <div class="glass-card p-6 rounded-xl shadow-sm">
            <h3 class="text-gray-500 font-semibold text-sm">TODAY'S RISK</h3>
            <p id="todayRisk" class="text-3xl font-black mt-2 text-gray-800">Loading...</p>
        </div>
        <div class="glass-card p-6 rounded-xl shadow-sm">
            <h3 class="text-gray-500 font-semibold text-sm">PROBABILITY</h3>
            <p id="todayProb" class="text-3xl font-black mt-2 text-gray-800">--%</p>
        </div>
    </div>

    <!-- Chart Section -->
    <div class="glass-card p-6 rounded-xl shadow-sm w-full">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-gray-800">Boar Detections vs Predictions</h3>
            <select id="timeRange" class="rounded border-gray-300 py-1.5 px-4 text-sm font-medium">
                <option value="week">Past Week</option>
                <option value="day">Past 24 Hours</option>
                <option value="month">Past Month</option>
            </select>
        </div>
        <div class="relative w-full h-96">
            <!-- Canvas for Chart.js -->
            <canvas id="forecastChart"></canvas>
        </div>
    </div>

</main>

<script src="/static/js/admin.js"></script>
<script src="/static/js/dashboard.js"></script>
</body>
</html>
